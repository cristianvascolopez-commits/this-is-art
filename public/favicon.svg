<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#111111"/>
  <!-- Scissors top blade -->
  <g transform="rotate(-30, 32, 32)">
    <ellipse cx="20" cy="24" rx="6" ry="6" fill="none" stroke="#c9a84c" stroke-width="3"/>
    <line x1="24.5" y1="21" x2="48" y2="10" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
    <!-- Scissors bottom blade -->
    <ellipse cx="20" cy="40" rx="6" ry="6" fill="none" stroke="#c9a84c" stroke-width="3"/>
    <line x1="24.5" y1="43" x2="48" y2="54" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
    <!-- Pivot -->
    <circle cx="32" cy="32" r="2.5" fill="#c9a84c"/>
  </g>
</svg>
